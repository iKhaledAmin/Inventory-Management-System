spring:
  datasource:
    url: jdbc:mysql://localhost:3307/inventory_management
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    database: mysql
    dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

application:

  bootstrap:
    admin:
      username: admin
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
      email: admin@inventory.local

  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration-configs:
        ACCOUNT:
          expiration-minutes: 30

  auth:
    activation:
      frontend-url: http://localhost:4200/activate-account

  verification-token:
    verification-configs:
      ACCOUNT_ACTIVATION:
        codeLength: 6
        expirationMinutes: 5

      ACCOUNT_RESET_PASSWORD:
        codeLength: 6
        expirationMinutes: 3

  email:
    sender:
      from: no-reply@inventory-system.com
      reply-to: support@inventory-system.com

    retry:
      policy:
        backoff-seconds: 60
        max-attempts: 5

      scheduler:
        interval-seconds: 120