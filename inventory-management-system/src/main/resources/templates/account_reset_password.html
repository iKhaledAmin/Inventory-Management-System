<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 600px;
            margin: 10px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .reset-code {
            font-size: 36px;
            text-align: center;
            margin-bottom: 20px;
        }

        .reset-link {
            display: block;
            text-align: center;
            margin-top: 20px;
        }

        .reset-link a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }

        .warning {
            margin-top: 20px;
            color: #dc3545;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Password Reset</h1>

    <p th:text="'Hello ' + ${username} + ','"></p>

    <p>
        We received a request to reset your account password.
        Use the following reset code:
    </p>

    <div class="reset-code">
        <span th:text="${resetCode}"></span>
    </div>

    <div class="reset-link">
        <a th:href="${resetUrl}" target="_blank">
            Reset Password
        </a>
    </div>

    <p class="warning">
        If you did not request a password reset, please ignore this email.
    </p>

</div>

</body>
</html>
